# 妙喵 nginx 配置（阿里云 ECS 8.130.190.169）
# 部署位置: /etc/nginx/conf.d/miaomiao.conf 或 sites-available
#
# 现状说明（Demo 阶段）：
# - 证书为自签名（/etc/nginx/ssl/），浏览器会警告，接受一次即可
# - 自签名 HTTPS 入口主要用于网页端语音（getUserMedia 需要安全上下文）
# - 纯文字访问可直连 http://8.130.190.169:8000（不经过 nginx）

server {
    listen 80;
    server_name 8.130.190.169;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 8.130.190.169;

    # 自签名证书（文件名以服务器 /etc/nginx/ssl/ 实际为准）
    ssl_certificate     /etc/nginx/ssl/miaomiao.crt;
    ssl_certificate_key /etc/nginx/ssl/miaomiao.key;

    # 上传音频体较大，放宽限制
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
