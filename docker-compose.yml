version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EWA_DATA_DIR=/app/data
      - MIAOMIAO_DATA_DIR=/app/data/miaomiao
      - EWA_CORS_ORIGINS=${EWA_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
